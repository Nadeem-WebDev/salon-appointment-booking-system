<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Dark premium background with rounded corners -->
  <rect width="120" height="120" rx="24" fill="#1A202C" />
  
  <!-- Barber Scissors -->
  <g stroke="#CBD5E0" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left handle and blade -->
    <circle cx="35" cy="85" r="14" />
    <line x1="45" y1="75" x2="95" y2="25" />
    
    <!-- Right handle and blade -->
    <circle cx="85" cy="85" r="14" />
    <line x1="75" y1="75" x2="25" y2="25" />
  </g>
  
  <!-- Scissor Pivot Details -->
  <circle cx="60" cy="60" r="6" fill="#1A202C" stroke="none" />
  <circle cx="60" cy="60" r="3" fill="#CBD5E0" stroke="none" />

  <!-- Classic Handlebar Mustache -->
  <path d="M60 48 
           C35 48 15 58 5 78 
           C20 63 40 63 55 71 
           C58 73 62 73 65 71 
           C80 63 100 63 115 78 
           C105 58 85 48 60 48 Z" 
        fill="#D4AF37" />
</svg>
